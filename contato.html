<div class="container">
    <h2>Entre em Contato</h2>
    <form action="#">
        <label>Nome Completo:</label>
        <input type="text" required>

        <label>E-mail:</label>
        <input type="email" required>

        <label>Tipo de Cliente:</label>
        <div>
            <input type="radio" name="tipo" value="PF"> Pessoa Física
            <input type="radio" name="tipo" value="PJ"> Pessoa Jurídica
        </div>

        <label>Serviço Desejado:</label>
        <select>
            <option>Site Estático</option>
            <option>Site Dinâmico</option>
            <option>Consultoria</option>
        </select>

        <label>Melhor horário para contato:</label>
        <input type="checkbox" value="Manhã"> Manhã
        <input type="checkbox" value="Tarde"> Tarde

        <label>Descrição do Projeto:</label>
        <textarea rows="4"></textarea>

        <button type="submit">Enviar Proposta</button>
    </form>
</div>
